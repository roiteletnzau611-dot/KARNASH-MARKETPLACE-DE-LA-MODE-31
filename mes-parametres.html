<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paramètres du client</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6fb;
}

header{
background:#0d6efd;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
max-width:700px;
margin:20px auto;
padding:15px;
}

.card{
background:white;
border-radius:15px;
padding:18px;
margin-bottom:18px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card h3{
margin-bottom:15px;
color:#0d6efd;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 0;
border-bottom:1px solid #eee;
}

.item:last-child{
border:none;
}

.item i{
margin-right:10px;
color:#0d6efd;
}

button{
background:#0d6efd;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#084298;
}

.switch{
position:relative;
display:inline-block;
width:52px;
height:28px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#ccc;
transition:.4s;
border-radius:30px;
}

.slider:before{
position:absolute;
content:"";
height:22px;
width:22px;
left:3px;
bottom:3px;
background:white;
transition:.4s;
border-radius:50%;
}

input:checked + .slider{
background:#0d6efd;
}

input:checked + .slider:before{
transform:translateX(24px);
}

.logout{
background:#ff9800;
}

.delete{
background:#dc3545;
}

select{
padding:8px;
border-radius:8px;
}

</style>

</head>

<body>

<header>
⚙️ Paramètres
</header>

<div class="container">

<div class="card">

<h3>👤 Profil</h3>

<div class="item">
<span><i class="fa fa-user"></i>Nom</span>
<button>Modifier</button>
</div>

<div class="item">
<span><i class="fa fa-envelope"></i>Email</span>
<button>Modifier</button>
</div>

<div class="item">
<span><i class="fa fa-phone"></i>Téléphone</span>
<button>Modifier</button>
</div>

</div>

<div class="card">

<h3>🔒 Sécurité</h3>

<div class="item">
<span><i class="fa fa-lock"></i>Modifier le mot de passe</span>
<button>Changer</button>
</div>

<div class="item">
<span><i class="fa fa-shield"></i>Authentification 2FA</span>

<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>

</div>

</div>

<div class="card">

<h3>🔔 Notifications</h3>

<div class="item">
<span>Commandes</span>

<label class="switch">
<input type="checkbox" checked>
<span class="slider"></span>
</label>

</div>

<div class="item">
<span>Promotions</span>

<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>

</div>

</div>

<div class="card">

<h3>🌙 Apparence</h3>

<div class="item">
<span>Mode sombre</span>

<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>

</div>

</div>

<div class="card">

<h3>🌍 Langue</h3>

<div class="item">

<select>

<option>Français</option>

<option>English</option>

<option>Lingala</option>

<option>Swahili</option>

</select>

</div>

</div>

<div class="card">

<h3>📍 Adresse</h3>

<div class="item">
<span>Adresse de livraison</span>
<button>Modifier</button>
</div>

</div>

<div class="card">

<h3>💳 Paiement</h3>

<div class="item">
<span>Moyens de paiement</span>
<button>Gérer</button>
</div>

</div>

<div class="card">

<h3>🚪 Session</h3>

<div class="item">
<button class="logout">
Déconnexion
</button>
</div>

</div>

<div class="card">

<h3>🗑️ Compte</h3>

<div class="item">

<button class="delete">
Supprimer le compte
</button>

</div>

</div>

</div>

<script>

document.querySelector(".delete").onclick=function(){

if(confirm("Voulez-vous vraiment supprimer votre compte ?")){

alert("Compte supprimé.");

}

}

document.querySelector(".logout").onclick=function(){

if(confirm("Voulez-vous vous déconnecter ?")){

alert("Déconnexion réussie.");

}

}

</script>

</body>
</html>
