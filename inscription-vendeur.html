<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription Vendeur</title>

<style>

body{
margin:0;
font-family:Segoe UI,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#1f4e79,#3d7eb8);
}

.form{
width:390px;
padding:35px;
background:white;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h2{
text-align:center;
color:#1f4e79;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
}

button{
width:100%;
padding:14px;
background:#1f4e79;
color:white;
border:none;
border-radius:30px;
font-size:17px;
cursor:pointer;
}

button:hover{
background:#163c5e;
}

a{
display:block;
margin-top:20px;
text-align:center;
text-decoration:none;
color:#1f4e79;
}

</style>

</head>

<body>

<div class="form">

<h2>🏪 Inscription Vendeur</h2>

<input type="text" placeholder="Nom de la boutique">

<input type="text" placeholder="Nom du responsable">

<input type="email" placeholder="Adresse e-mail">

<input type="tel" placeholder="Téléphone">

<input type="password" placeholder="Mot de passe">

<button>Créer mon compte</button>

<a href="index.html">⬅ Retour</a>

</div>

</body>
</html>
