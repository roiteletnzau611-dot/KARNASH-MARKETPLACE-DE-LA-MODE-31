<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription Vendeur</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:linear-gradient(135deg,#1f4e79,#3d7eb8);
padding:20px;
}

.form{
width:420px;
background:#fff;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h2{
text-align:center;
color:#1f4e79;
margin-bottom:20px;
}

input{
width:100%;
padding:13px;
margin:10px 0;
border:1px solid #ccc;
border-radius:10px;
font-size:15px;
}

input[type=file]{
padding:8px;
}

img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
display:block;
margin:15px auto;
border:3px solid #1f4e79;
}

button{
width:100%;
padding:14px;
background:#1f4e79;
color:white;
border:none;
border-radius:30px;
font-size:17px;
cursor:pointer;
}

button:hover{
background:#163c5e;
}

a{
display:block;
text-align:center;
margin-top:15px;
text-decoration:none;
color:#1f4e79;
}
</style>

</head>
<body>

<div class="form">

<h2>🏪 Inscription Vendeur</h2>

<form id="registerSeller">

<input type="text" id="boutique" placeholder="Nom de la boutique" required>

<input type="text" id="nom" placeholder="Nom du responsable" required>

<input type="email" id="email" placeholder="Adresse e-mail" required>

<input type="tel" id="telephone" placeholder="Téléphone" required>

<input type="password" id="password" placeholder="Mot de passe" required>

<label>Logo de la boutique</label>

<input type="file" id="photo" accept="image/*">

<img id="preview" src="https://via.placeholder.com/120?text=Logo">

<button type="submit">Créer mon compte</button>

</form>

<a href="login-vendeur.html">Déjà inscrit ? Se connecter</a>

</div>

<script>

let photoBase64="";

document.getElementById("photo").addEventListener("change",function(){

const file=this.files[0];

if(!file) return;

const reader=new FileReader();

reader.onload=function(e){

photoBase64=e.target.result;

document.getElementById("preview").src=photoBase64;

};

reader.readAsDataURL(file);

});

document.getElementById("registerSeller").addEventListener("submit",function(e){

e.preventDefault();

const vendeur={

boutique:document.getElementById("boutique").value,

nom:document.getElementById("nom").value,

email:document.getElementById("email").value,

telephone:document.getElementById("telephone").value,

password:document.getElementById("password").value,

photo:photoBase64

};

localStorage.setItem("vendeur",JSON.stringify(vendeur));

localStorage.setItem("vendeurConnecte","true");

alert("Compte créé avec succès !");

window.location.href="vendeur-dashboard.html";

});

</script>

</body>
</html>
