<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalogue | Vogue Marketplace</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#f4f4f4;
}

header{
background:linear-gradient(135deg,#6a2b83,#3d1a4d);
padding:20px;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:bold;
}

.search input{
padding:12px;
width:280px;
border:none;
border-radius:30px;
outline:none;
}

.categories{
display:flex;
gap:15px;
padding:20px;
overflow:auto;
background:white;
}

.categories button{
padding:10px 20px;
border:none;
border-radius:30px;
background:#6a2b83;
color:white;
cursor:pointer;
}

.grid{
max-width:1300px;
margin:auto;
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.15);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.info{
padding:15px;
}

.info h3{
margin-bottom:10px;
}

.price{
font-size:22px;
color:#6a2b83;
font-weight:bold;
margin:10px 0;
}

.stars{
color:gold;
}

.actions{
display:flex;
gap:10px;
margin-top:15px;
}

.actions button{
flex:1;
padding:12px;
border:none;
border-radius:30px;
cursor:pointer;
}

.panier{
background:#6a2b83;
color:white;
}

.favori{
background:#e91e63;
color:white;
}

footer{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:15px;
box-shadow:0 -2px 10px rgba(0,0,0,.15);
}

footer a{
text-decoration:none;
color:#6a2b83;
font-weight:bold;
}

</style>

</head>

<body>

<header>

<div class="logo">

🛍️ Vogue Marketplace

</div>

<div class="search">

<input type="text" placeholder="Rechercher un produit...">

</div>

</header>

<div class="categories">

<button>👕 Vêtements</button>

<button>👟 Chaussures</button>

<button>👜 Sacs</button>

<button>⌚ Montres</button>

<button>💄 Beauté</button>

<button>Les appareils électroniques</button>
</div>

<div class="grid">

<div class="card">

<img src="https://via.placeholder.com/300x220">

<div class="info">

<h3>Chemise Homme</h3>

<div class="stars">

⭐⭐⭐⭐⭐

</div>

<p class="price">25 $</p>

<div class="actions">

<button class="panier">🛒 Panier</button>

<button class="favori">❤️</button>

</div>

</div>

</div>

<div class="card">

<img src="https://via.placeholder.com/300x220">

<div class="info">

<h3>Basket Sport</h3>

<div class="stars">

⭐⭐⭐⭐⭐

</div>

<p class="price">80 $</p>

<div class="actions">

<button class="panier">🛒 Panier</button>

<button class="favori">❤️</button>

</div>

</div>

</div>

</div>

<footer>

<a href="client-dashboard.html">🏠 Accueil</a>

<a href="favoris.html">❤️ Favoris</a>

<a href="discussion.html">💬 Messages</a>

<a href="panier.html">🛒 Panier</a>

<a href="profil.html">👤 Profil</a>

</footer>

</body>
</html>
