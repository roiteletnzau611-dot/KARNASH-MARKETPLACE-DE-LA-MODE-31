<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages - Marketplace</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f0f2f5;
}

/* Layout */
.container {
    display: flex;
    height: 100vh;
}

/* Sidebar conversations */
.sidebar {
    width: 30%;
    background: white;
    border-right: 1px solid #ddd;
    overflow-y: auto;
}

.chat-item {
    padding: 15px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
    display: flex;
    align-items: center;
}

.chat-item:hover {
    background: #f5f5f5;
}

.avatar {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: #ccc;
    margin-right: 10px;
}

.chat-info {
    flex: 1;
}

.chat-name {
    font-weight: bold;
}

.chat-last {
    font-size: 12px;
    color: gray;
}

/* Chat box */
.chat-box {
    width: 70%;
    display: flex;
    flex-direction: column;
}

.chat-header {
    padding: 15px;
    background: white;
    border-bottom: 1px solid #ddd;
    font-weight: bold;
}

.messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    background: #e5ddd5;
    display: flex;
    flex-direction: column;
}

/* Message bubbles */
.message {
    max-width: 60%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 10px;
}

.me {
    background: #dcf8c6;
    align-self: flex-end;
}

.them {
    background: white;
    align-self: flex-start;
}

/* Input */
.input-box {
    display: flex;
    padding: 10px;
    background: white;
    border-top: 1px solid #ddd;
}

.input-box input {
    flex: 1;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 20px;
    outline: none;
}

.input-box button {
    margin-left: 10px;
    padding: 10px 20px;
    border: none;
    background: #25d366;
    color: white;
    border-radius: 20px;
    cursor: pointer;
}

.input-box button:hover {
    background: #1ebe5d;
}
</style>

</head>
<body>

<div class="container">

    <!-- LISTE CONVERSATIONS -->
    <div class="sidebar">
        <div class="chat-item">
            <div class="avatar"></div>
            <div class="chat-info">
                <div class="chat-name">Vendeur Smartphone</div>
                <div class="chat-last">Bonjour, le produit est dispo</div>
            </div>
        </div>

        <div class="chat-item">
            <div class="avatar"></div>
            <div class="chat-info">
                <div class="chat-name">Boutique Mode</div>
                <div class="chat-last">Merci pour votre achat</div>
            </div>
        </div>
    </div>

    <!-- CHAT -->
    <div class="chat-box">

        <div class="chat-header">
            💬 Conversation avec Vendeur Smartphone
        </div>

        <div class="messages" id="messages">
            <div class="message them">Bonjour 👋</div>
            <div class="message them">Le téléphone est encore disponible</div>
            <div class="message me">Oui, je suis intéressé</div>
        </div>

        <div class="input-box">
            <input type="text" id="msgInput" placeholder="Écrire un message...">
            <button onclick="sendMessage()">Envoyer</button>
        </div>

    </div>

</div>

<script>
function sendMessage() {
    let input = document.getElementById("msgInput");
    let text = input.value.trim();

    if(text === "") return;

    let msgBox = document.getElementById("messages");

    let msg = document.createElement("div");
    msg.className = "message me";
    msg.textContent = text;

    msgBox.appendChild(msg);

    input.value = "";

    // auto scroll
    msgBox.scrollTop = msgBox.scrollHeight;

    // réponse automatique simulée (vendeur)
    setTimeout(() => {
        let reply = document.createElement("div");
        reply.className = "message them";
        reply.textContent = "D'accord 👍 je vous réponds bientôt";
        msgBox.appendChild(reply);
        msgBox.scrollTop = msgBox.scrollHeight;
    }, 1000);
}
</script>

</body>
</html>
