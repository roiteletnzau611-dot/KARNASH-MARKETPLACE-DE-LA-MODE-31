<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau de bord Client - Vogue Marketplace</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:linear-gradient(135deg,#6a2b83,#3d1a4d);
padding:20px;
color:white;
text-align:center;
font-size:28px;
font-weight:bold;
}

nav{
display:flex;
justify-content:space-around;
background:white;
padding:15px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
position:sticky;
top:0;
}

nav a{
text-decoration:none;
color:#6a2b83;
font-weight:bold;
}

.container{
padding:20px;
}

.search{
margin-bottom:20px;
}

.search input{
width:100%;
padding:15px;
border-radius:30px;
border:1px solid #ccc;
font-size:16px;
}

h2{
margin:20px 0;
color:#3d1a4d;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.15);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card h3{
padding:10px;
color:#333;
}

.card p{
padding:0 10px;
color:#666;
}

.price{
padding:10px;
font-size:20px;
color:#6a2b83;
font-weight:bold;
}

button{
margin:10px;
padding:12px;
width:calc(100% - 20px);
border:none;
border-radius:30px;
background:#6a2b83;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#4d1d61;
}

footer{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:white;
padding:12px;
box-shadow:0 -2px 10px rgba(0,0,0,.2);
}

footer a{
text-decoration:none;
color:#6a2b83;
font-weight:bold;
}

</style>

</head>

<body>

<header>

🛍️ Vogue Marketplace

</header>

<nav>

<a href="#">🏠 Accueil</a>

<a href="#">❤️ Favoris</a>

<a href="#">💬 Discussion</a>

<a href="#">🛒 Panier</a>

<a href="#">👤 Profil</a>

</nav>

<div class="container">

<div class="search">

<input type="text" placeholder="🔍 Rechercher une boutique ou un produit...">

</div>

<h2>Boutiques populaires</h2>

<div class="grid">

<div class="card">

<img src="https://via.placeholder.com/300x180">

<h3>Boutique Élégance</h3>

<p>⭐⭐⭐⭐⭐</p>

<button>Voir la boutique</button>

</div>

<div class="card">

<img src="https://via.placeholder.com/300x180">

<h3>Fashion Style</h3>

<p>⭐⭐⭐⭐⭐</p>

<button>Voir la boutique</button>

</div>

<div class="card">

<img src="https://via.placeholder.com/300x180">

<h3>Luxury Wear</h3>

<p>⭐⭐⭐⭐⭐</p>

<button>Voir la boutique</button>

</div>

</div>

<h2>Produits populaires</h2>

<div class="grid">

<div class="card">

<img src="https://via.placeholder.com/300x180">

<h3>Chemise Homme</h3>

<p class="price">25 $</p>

<button>Ajouter au panier</button>

</div>

<div class="card">

<img src="https://via.placeholder.com/300x180">

<h3>Basket Nike</h3>

<p class="price">80 $</p>

<button>Ajouter au panier</button>

</div>

<div class="card">

<img src="https://via.placeholder.com/300x180">

<h3>Sac à main</h3>

<p class="price">45 $</p>

<button>Ajouter au panier</button>

</div>

</div>

</div>

<footer>

<a href="#">🏠</a>

<a href="#">❤️</a>

<a href="#">💬</a>

<a href="#">🛒</a>

<a href="#">👤</a>

</footer>

</body>
</html>
