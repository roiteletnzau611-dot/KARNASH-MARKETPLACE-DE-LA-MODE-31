<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discussion | Vogue Marketplace</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#f5f5f5;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:linear-gradient(135deg,#6a2b83,#3d1a4d);
color:white;
padding:20px;
display:flex;
align-items:center;
gap:15px;
}

.avatar{
width:50px;
height:50px;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
}

.messages{
flex:1;
overflow:auto;
padding:20px;
}

.message{
max-width:70%;
padding:15px;
margin:10px 0;
border-radius:20px;
}

.received{
background:white;
}

.sent{
background:#6a2b83;
color:white;
margin-left:auto;
}

.input-area{
display:flex;
padding:15px;
background:white;
box-shadow:0 -3px 10px rgba(0,0,0,.15);
}

input{
flex:1;
padding:15px;
border:1px solid #ccc;
border-radius:30px;
outline:none;
}

button{
margin-left:10px;
padding:15px 25px;
background:#6a2b83;
color:white;
border:none;
border-radius:30px;
cursor:pointer;
}

button:hover{
background:#4b1c63;
}

</style>

</head>

<body>

<header>

<div class="avatar">🏪</div>

<div>

<h2>Boutique Élégance</h2>

<p>En ligne</p>

</div>

</header>

<div class="messages" id="chat">

<div class="message received">

Bonjour 👋
Comment puis-je vous aider ?

</div>

<div class="message sent">

Bonjour.
La chemise est-elle disponible ?

</div>

</div>

<div class="input-area">

<input id="texte" placeholder="Écrire un message...">

<button onclick="envoyer()">Envoyer</button>

</div>

<script>

function envoyer(){

let texte=document.getElementById("texte");

if(texte.value=="") return;

document.getElementById("chat").innerHTML+=
'<div class="message sent">'+texte.value+'</div>';

texte.value="";

}

</script>

</body>
</html>
