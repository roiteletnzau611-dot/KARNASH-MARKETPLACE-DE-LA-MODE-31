<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Panier</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

header{
background:#2563eb;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
width:90%;
max-width:1000px;
margin:30px auto;
}

.produit{
background:white;
display:flex;
align-items:center;
gap:20px;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.produit img{
width:120px;
height:120px;
object-fit:cover;
border-radius:10px;
}

.info{
flex:1;
}

.info h3{
margin:0;
}

.prix{
font-size:20px;
color:#2563eb;
font-weight:bold;
margin-top:10px;
}

.actions{
display:flex;
align-items:center;
gap:10px;
margin-top:15px;
}

.actions button{
padding:8px 15px;
border:none;
border-radius:8px;
cursor:pointer;
background:#2563eb;
color:white;
font-size:18px;
}

.supprimer{
background:red;
}

.resume{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.resume h2{
margin-top:0;
}

.resume p{
font-size:18px;
display:flex;
justify-content:space-between;
}

.total{
font-size:24px;
font-weight:bold;
color:#2563eb;
}

.payer{
width:100%;
padding:18px;
border:none;
border-radius:10px;
background:green;
color:white;
font-size:20px;
cursor:pointer;
margin-top:20px;
}

.retour{
width:100%;
padding:18px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:20px;
cursor:pointer;
margin-top:10px;
}

</style>

</head>

<body>

<header>
🛒 Mon Panier
</header>

<div class="container">

<div id="listePanier">

<div class="produit">

<img src="https://via.placeholder.com/120">

<div class="info">

<h3>Nom du produit</h3>

<div class="prix">50 $</div>

<div class="actions">

<button>-</button>

<span>1</span>

<button>+</button>

<button class="supprimer">
🗑
</button>

</div>

</div>

</div>

</div>

<div class="resume">

<h2>Résumé</h2>

<p>
<span>Sous-total</span>
<span id="sousTotal">50 $</span>
</p>

<p>
<span>Livraison</span>
<span>5 $</span>
</p>

<p class="total">
<span>Total</span>
<span id="total">55 $</span>
</p>

<button class="payer"
onclick="window.location.href='paiement-client.html'">
💳 Passer au paiement
</button>

<button class="retour"
onclick="window.location.href='client-dashboard.html'">
⬅ Continuer les achats
</button>

</div>

</div>
<script>
let panier = JSON.parse(localStorage.getItem("panier")) || [];

const listePanier = document.getElementById("listePanier");

function afficherPanier() {

    listePanier.innerHTML = "";

    let sousTotal = 0;

    if (panier.length === 0) {
        listePanier.innerHTML = "<h2 style='text-align:center;'>🛒 Votre panier est vide.</h2>";
        document.getElementById("sousTotal").innerText = "0 $";
        document.getElementById("total").innerText = "0 $";
        return;
    }

    panier.forEach((produit, index) => {

        sousTotal += produit.prix * produit.quantite;

        listePanier.innerHTML += `
        <div class="produit">

            <img src="${produit.image}">

            <div class="info">

                <h3>${produit.nom}</h3>

                <div class="prix">${produit.prix} $</div>

                <div class="actions">

                    <button onclick="diminuer(${index})">-</button>

                    <span>${produit.quantite}</span>

                    <button onclick="augmenter(${index})">+</button>

                    <button class="supprimer" onclick="supprimer(${index})">
                    🗑
                    </button>

                </div>

            </div>

        </div>
        `;

    });

    document.getElementById("sousTotal").innerText = sousTotal + " $";
    document.getElementById("total").innerText = (sousTotal + 5) + " $";

    localStorage.setItem("panier", JSON.stringify(panier));

}

function augmenter(index){
    panier[index].quantite++;
    afficherPanier();
}

function diminuer(index){

    if(panier[index].quantite>1){
        panier[index].quantite--;
    }

    afficherPanier();

}

function supprimer(index){

    panier.splice(index,1);

    afficherPanier();

}

afficherPanier();

</script>
  
</body>
</html>
