<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panier | Vogue Marketplace</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#6a2b83;
color:white;
padding:20px;
font-size:28px;
text-align:center;
font-weight:bold;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
display:grid;
grid-template-columns:2fr 1fr;
gap:30px;
}

.cart{
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.item{
display:flex;
align-items:center;
margin-bottom:20px;
padding-bottom:20px;
border-bottom:1px solid #ddd;
}

.item img{
width:120px;
height:120px;
border-radius:15px;
object-fit:cover;
margin-right:20px;
}

.info{
flex:1;
}

.info h3{
margin-bottom:10px;
}

.price{
color:#6a2b83;
font-size:22px;
font-weight:bold;
}

.qty{
margin-top:10px;
}

.qty input{
width:60px;
padding:5px;
}

.summary{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
height:fit-content;
}

.summary h2{
margin-bottom:20px;
}

.row{
display:flex;
justify-content:space-between;
margin:15px 0;
}

.total{
font-size:22px;
font-weight:bold;
color:#6a2b83;
}

button{

width:100%;
padding:15px;
border:none;
border-radius:30px;
background:#6a2b83;
color:white;
font-size:18px;
cursor:pointer;
margin-top:20px;

}

button:hover{
background:#4d1d61;
}

</style>

</head>

<body>

<header>

🛒 Mon Panier

</header>

<div class="container">

<div class="cart">

<div class="item">

<img src="https://via.placeholder.com/120">

<div class="info">

<h3>Chemise Homme</h3>

<p class="price">25 $</p>

<div class="qty">

Quantité :

<input type="number" value="1">

</div>

</div>

</div>

<div class="item">

<img src="https://via.placeholder.com/120">

<div class="info">

<h3>Basket Sport</h3>

<p class="price">80 $</p>

<div class="qty">

Quantité :

<input type="number" value="1">

</div>

</div>

</div>

</div>

<div class="summary">

<h2>Résumé</h2>

<div class="row">

<span>Sous-total</span>

<span>105 $</span>

</div>

<div class="row">

<span>Livraison</span>

<span>5 $</span>

</div>

<div class="row total">

<span>Total</span>

<span>110 $</span>

</div>

<button onclick="location.href='paiement.html'">

Passer au paiement

</button>

</div>

</div>

</body>
</html>
