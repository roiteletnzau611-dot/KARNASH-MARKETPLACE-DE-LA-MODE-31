<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter un produit</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f5f6fa; }
        .container { max-width: 600px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,.1); }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        textarea { height: 100px; resize: vertical; }
        button { width: 100%; background: #007bff; color: #fff; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    <h2>➕ Ajouter un produit</h2>

    <form id="formProduit">
        <div class="form-group">
            <input type="text" id="nom" placeholder="Nom du produit" required>
        </div>

        <div class="form-group">
            <select id="categorie" required>
                <option value="">Choisir une catégorie</option>
                <option>Maison</option>
                <option>Mode</option>
                <option>Beauté</option>
                <option>Électronique</option>
            </select>
        </div>

        <div class="form-group">
            <input type="number" id="prix" placeholder="Prix" required>
        </div>

        <div class="form-group">
            <textarea id="description" placeholder="Description"></textarea>
        </div>

        <div class="form-group">
            <label>Photo du produit :</label>
            <input type="file" id="photo" accept="image/*">
        </div>

        <button type="submit">Publier le produit</button>
    </form>
</div>

<script>
    document.getElementById("formProduit").addEventListener("submit", function(e) {
        e.preventDefault();

        const lecteur = new FileReader();
        const fichier = document.getElementById("photo").files[0];

     // Dans mes-produits.html, le début du script doit ressembler à ça :
// ... votre code existant ...
const fichier = document.getElementById("photo").files[0];

// AJOUTEZ CE BLOC ICI :
function enregistrer(photo) {
    // On récupère le vendeur connecté
    const vendeur = JSON.parse(localStorage.getItem("vendeurConnecte"));
    
    // Si aucun vendeur n'est connecté, on arrête tout
    if (!vendeur) {
        alert("Vous devez être connecté pour publier.");
        window.location.href = "connexion-vendeur.html";
        return;
    }

    const produit = {
        boutique: vendeur.nomBoutique, // On utilise le nom de la boutique du vendeur connecté
        nom: document.getElementById("nom").value,
        categorie: document.getElementById("categorie").value,
        prix: document.getElementById("prix").value,
        description: document.getElementById("description").value,
        photo: photo
    };

    let produits = JSON.parse(localStorage.getItem("produits")) || [];
    produits.push(produit);
    localStorage.setItem("produits", JSON.stringify(produits));

    alert("Produit publié dans la boutique " + vendeur.nomBoutique);
    window.location.href = "mes-produits.html";
}
}
}

// Puis vient votre bloc "if (fichier) {" que vous avez déjà
if (fichier) {
// ...

        // Gestion de l'image (conversion en base64)
        if (fichier) {
            lecteur.onload = function() {
                enregistrer(lecteur.result);
            }
            lecteur.readAsDataURL(fichier);
        } else {
            enregistrer(""); // Pas d'image
        }
    });
</script>

</body>
</html>
