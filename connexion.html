<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion - Vogue Marketplace</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#6a2b83,#3d1a4d);
}

.container{
width:400px;
padding:35px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
border-radius:25px;
box-shadow:0 15px 35px rgba(0,0,0,.4);
color:white;
text-align:center;
}

.logo{
width:90px;
height:90px;
margin:auto;
margin-bottom:20px;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
}

h2{
margin-bottom:20px;
}

select,input{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:12px;
font-size:16px;
outline:none;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:30px;
background:#ffffff;
color:#6a2b83;
font-size:17px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.03);
}

a{
display:block;
margin-top:20px;
color:white;
text-decoration:none;
}
</style>

</head>

<body>

<div class="container">

<div class="logo">🛍️</div>

<h2>Connexion</h2>

<select id="type">
<option value="client">Client</option>
<option value="vendeur">Vendeur</option>
</select>

<input type="email" id="email" placeholder="Adresse e-mail">

<input type="password" id="password" placeholder="Mot de passe">

<button onclick="connexion()">Se connecter</button>

<a href="index.html">⬅ Retour à l'accueil</a>

</div>

<script>

function connexion(){

let type=document.getElementById("type").value;

if(type=="client"){
window.location="client-dashboard.html";
}
else{
window.location="vendeur-dashboard.html";
}

}

</script>

</body>
</html>
