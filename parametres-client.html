<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paramètres du client</title>

<link rel="stylesheet" href="style.css">

<style>
/* Le CSS sera ajouté dans la Partie 2 */
  *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
}

header{
background:#2563eb;
color:white;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
box-shadow:0 3px 10px rgba(0,0,0,.2);
}

.container{
max-width:900px;
margin:30px auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card h2{
margin-bottom:20px;
color:#2563eb;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 0;
border-bottom:1px solid #ddd;
}

.item:last-child{
border-bottom:none;
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
font-size:15px;
transition:.3s;
}

button:hover{
background:#1746a2;
}

.logout{
background:#f59e0b;
}

.logout:hover{
background:#d97706;
}

.delete{
background:#dc2626;
margin-top:20px;
width:100%;
}

.delete:hover{
background:#b91c1c;
}

select{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
width:100%;
margin-top:10px;
}

input[type="checkbox"]{
transform:scale(1.4);
cursor:pointer;
}

.dark-mode{
background:#111827;
color:white;
}

.dark-mode .card{
background:#1f2937;
color:white;
}

.dark-mode h2{
color:#60a5fa;
}

.dark-mode button{
background:#3b82f6;
}

@media(max-width:768px){

.container{
padding:10px;
}

.item{
flex-direction:column;
align-items:flex-start;
gap:10px;
}

button{
width:100%;
}

}
</style>

</head>

<body>

<header>
<h1>⚙️ Paramètres</h1>
</header>

<div class="container">

<div class="card">
<h2>👤 Informations personnelles</h2>

<div class="item">
<span>Nom</span>
<button onclick="modifierNom()">Modifier</button>
</div>

<div class="item">
<span>Email</span>
<button onclick="modifierEmail()">Modifier</button>
</div>

<div class="item">
<span>Téléphone</span>
<button onclick="modifierTelephone()">Modifier</button>
</div>

<div class="item">
<span>Photo de profil</span>
<button onclick="changerPhoto()">Changer</button>
</div>

</div>

<div class="card">

<h2>🔒 Sécurité</h2>

<div class="item">
<span>Modifier le mot de passe</span>
<button onclick="modifierMotDePasse()">Changer</button>
</div>

</div>

<div class="card">

<h2>🔔 Notifications</h2>

<div class="item">
<span>Activer les notifications</span>
<input type="checkbox" id="notifications">
</div>

</div>

<div class="card">

<h2>🌙 Apparence</h2>

<div class="item">
<span>Mode sombre</span>
<input type="checkbox" id="modeSombre">
</div>

</div>

<div class="card">

<h2>🌍 Langue</h2>

<select id="langue">
<option>Français</option>
<option>English</option>
<option>Lingala</option>
<option>Swahili</option>
</select>

</div>

<div class="card">

<h2>📍 Adresse</h2>

<div class="item">
<span>Adresse de livraison</span>
<button onclick="modifierAdresse()">Modifier</button>
</div>

</div>

<div class="card">

<h2>💳 Paiement</h2>

<div class="item">
<span>Moyens de paiement</span>
<button onclick="gererPaiement()">Gérer</button>
</div>

</div>

<div class="card">

<button class="logout" onclick="logout()">
🚪 Déconnexion
</button>

<button class="delete" onclick="supprimerCompte()">
🗑️ Supprimer le compte
</button>

</div>

</div>

<!-- Le JavaScript sera ajouté dans la Partie 3 -->
<script>
// Charger les données enregistrées
window.onload = function () {

    if(localStorage.getItem("modeSombre") === "oui"){
        document.body.classList.add("dark-mode");
        document.getElementById("modeSombre").checked = true;
    }

    if(localStorage.getItem("notifications") === "oui"){
        document.getElementById("notifications").checked = true;
    }

    if(localStorage.getItem("langue")){
        document.getElementById("langue").value = localStorage.getItem("langue");
    }

}

// Modifier le nom
function modifierNom(){
    let nom = prompt("Entrez votre nouveau nom :");
    if(nom){
        localStorage.setItem("nomClient", nom);
        alert("Nom modifié avec succès.");
    }
}

// Modifier l'e-mail
function modifierEmail(){
    let email = prompt("Entrez votre nouvel e-mail :");
    if(email){
        localStorage.setItem("emailClient", email);
        alert("E-mail enregistré.");
    }
}

// Modifier le téléphone
function modifierTelephone(){
    let tel = prompt("Entrez votre nouveau numéro :");
    if(tel){
        localStorage.setItem("telephoneClient", tel);
        alert("Téléphone enregistré.");
    }
}

// Modifier le mot de passe
function modifierMotDePasse(){
    let mdp = prompt("Entrez votre nouveau mot de passe :");
    if(mdp){
        localStorage.setItem("motDePasseClient", mdp);
        alert("Mot de passe modifié.");
    }
}

// Changer la photo
function changerPhoto(){
    alert("Cette fonctionnalité sera ajoutée prochainement.");
}

// Modifier l'adresse
function modifierAdresse(){
    let adresse = prompt("Entrez votre nouvelle adresse :");
    if(adresse){
        localStorage.setItem("adresseClient", adresse);
        alert("Adresse enregistrée.");
    }
}

// Paiement
function gererPaiement(){
    alert("Gestion des moyens de paiement bientôt disponible.");
}

// Notifications
document.getElementById("notifications").addEventListener("change", function(){

    if(this.checked){
        localStorage.setItem("notifications","oui");
    }else{
        localStorage.setItem("notifications","non");
    }

});

// Mode sombre
document.getElementById("modeSombre").addEventListener("change", function(){

    document.body.classList.toggle("dark-mode");

    if(this.checked){
        localStorage.setItem("modeSombre","oui");
    }else{
        localStorage.setItem("modeSombre","non");
    }

});

// Langue
document.getElementById("langue").addEventListener("change", function(){

    localStorage.setItem("langue",this.value);

    alert("Langue changée : " + this.value);

});

// Déconnexion
function logout(){

    if(confirm("Voulez-vous vraiment vous déconnecter ?")){

        localStorage.removeItem("clientConnecte");

        window.location.href="index.html";

    }

}

// Supprimer le compte
function supprimerCompte(){

    if(confirm("Voulez-vous supprimer définitivement votre compte ?")){

        localStorage.clear();

        alert("Votre compte a été supprimé.");

        window.location.href="index.html";

    }

}
</script>
</body>
</html>
