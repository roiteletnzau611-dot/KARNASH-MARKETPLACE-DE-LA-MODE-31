<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administration</title>

<style>

body{
margin:0;
font-family:Segoe UI,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#222,#000);
}

.admin{
width:370px;
padding:35px;
background:#ffffff;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,.5);
}

h2{
text-align:center;
color:#d63031;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:1px solid #ccc;
border-radius:10px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
background:#d63031;
color:white;
border:none;
border-radius:30px;
font-size:17px;
cursor:pointer;
}

button:hover{
background:#b71c1c;
}

a{
display:block;
text-align:center;
margin-top:20px;
text-decoration:none;
color:#d63031;
}

</style>

</head>

<body>

<div class="admin">

<h2>🛡 Accès Administrateur</h2>

<input type="text" placeholder="Nom d'utilisateur">

<input type="password" placeholder="Mot de passe">

<button>Se connecter</button>

<a href="index.html">⬅ Retour</a>

</div>

</body>
</html>
