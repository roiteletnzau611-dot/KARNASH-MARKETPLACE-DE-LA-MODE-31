<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revenus</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f6fa;
padding:30px;
}

h1{
margin-bottom:25px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card h2{
color:#0d6efd;
margin-bottom:10px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
border-radius:12px;
overflow:hidden;
}

th{
background:#0d6efd;
color:white;
padding:15px;
}

td{
padding:15px;
border-bottom:1px solid #eee;
}

button{
margin-top:20px;
padding:12px 20px;
background:#198754;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>

</head>

<body>

<h1>💰 Revenus</h1>

<div class="cards">

<div class="card">
<h2>1 850 $</h2>
<p>Revenus totaux</p>
</div>

<div class="card">
<h2>92,50 $</h2>
<p>Commission (5 %)</p>
</div>

<div class="card">
<h2>1 757,50 $</h2>
<p>Solde disponible</p>
</div>

<div class="card">
<h2>250 $</h2>
<p>Retraits effectués</p>
</div>

</div>

<h2>Historique des paiements</h2>

<table>

<tr>
<th>Date</th>
<th>Commande</th>
<th>Montant</th>
<th>Commission</th>
<th>Net</th>
</tr>

<tr>
<td>29/06/2026</td>
<td>#1001</td>
<td>45 $</td>
<td>2,25 $</td>
<td>42,75 $</td>
</tr>

<tr>
<td>28/06/2026</td>
<td>#1002</td>
<td>80 $</td>
<td>4 $</td>
<td>76 $</td>
</tr>

</table>

<button>
Demander un retrait
</button>

</body>
</html>
