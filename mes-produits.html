<script>
    const conteneur = document.getElementById("listeProduits");
    const vendeur = JSON.parse(localStorage.getItem("vendeurConnecte"));

    if (vendeur) {
        const tousLesProduits = JSON.parse(localStorage.getItem("produits")) || [];
        // On filtre avec le nom de la boutique du vendeur connecté
        const mesProduits = tousLesProduits.filter(p => p.boutique === vendeur.nomBoutique);

        if (mesProduits.length === 0) {
            conteneur.innerHTML = "<p>Aucun produit dans votre boutique.</p>";
        } else {
            conteneur.innerHTML = ""; // Vide le message d'attente
            mesProduits.forEach(produit => {
                const div = document.createElement("div");
                div.className = "carte";
                div.innerHTML = `
                    ${produit.photo ? `<img src="${produit.photo}">` : ""}
                    <h3>${produit.nom}</h3>
                    <p>Prix: ${produit.prix} €</p>
                    <p>${produit.description}</p>
                `;
                conteneur.appendChild(div);
            });
        }
    } else {
        conteneur.innerHTML = "<p>Veuillez vous connecter pour voir vos produits.</p>";
    }
</script>
