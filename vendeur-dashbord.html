<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Vendeur</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
        body { background:#f4f7fb; display:flex; min-height:100vh; }
        .sidebar { width:260px; background:#0d1b2a; color:white; padding:20px; position:fixed; height:100%; }
        .logo { font-size:24px; font-weight:bold; margin-bottom:30px; text-align:center; }
        .sidebar ul { list-style:none; }
        .sidebar ul li { margin:15px 0; }
        .sidebar ul li a { text-decoration:none; color:white; display:flex; align-items:center; gap:12px; padding:12px; border-radius:10px; transition:0.3s; }
        .sidebar ul li a:hover, .sidebar ul li a.active { background:#1b263b; }
        .main { margin-left:260px; width:calc(100% - 260px); padding:20px; }
        .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; }
        .search-box { background:white; padding:10px 15px; border-radius:12px; width:300px; display:flex; align-items:center; gap:10px; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
        .search-box input { border:none; outline:none; width:100%; }
        .profile { display:flex; align-items:center; gap:12px; }
        .profile img { width:45px; height:45px; border-radius:50%; }
        .cards { display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:20px; margin-bottom:30px; }
        .card { background:white; padding:20px; border-radius:16px; box-shadow:0 3px 10px rgba(0,0,0,0.08); }
        .section { background:white; padding:20px; border-radius:16px; box-shadow:0 3px 10px rgba(0,0,0,0.08); margin-bottom:25px; }
        .btn { padding:8px 12px; border:none; border-radius:8px; cursor:pointer; color:white; }
        .btn-add { background:#28a745; padding:12px 18px; margin-bottom:15px; }
        @media(max-width:900px){ .sidebar { width:80px; } .sidebar ul li a span { display:none; } .main { margin-left:80px; width:calc(100% - 80px); } }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo">MonShop</div>
    <ul>
        <li><a href="#dashboard" class="active"><i class="fa fa-chart-line"></i> <span>Tableau de bord</span></a></li>
        <li><a href="#produits"><i class="fa fa-box"></i> <span>Produits</span></a></li>
        <li><a href="#ajouter"><i class="fa fa-plus-circle"></i> <span>Ajouter</span></a></li>
        <li><a href="#commandes"><i class="fa fa-clipboard-list"></i> <span>Commandes</span></a></li>
        <li><a href="#parametres"><i class="fa fa-cog"></i> <span>Paramètres</span></a></li>
        <li>
            <a href="#" onclick="logout()">
                <i class="fa fa-right-from-bracket"></i>
                <span>Déconnexion</span>
            </a>
        </li>
    </ul>
</aside>

<main class="main">
    <div class="topbar">
        <div class="search-box">
            <i class="fa fa-search"></i>
            <input type="text" placeholder="Rechercher..." />
        </div>
        <div class="profile">
            <img src="https://i.pravatar.cc/100" alt="Profil" />
            <div>
                <strong>Vendeur</strong><br>
                <small>En ligne</small>
            </div>
        </div>
    </div>

    <section class="cards" id="dashboard">
        <div class="card"><h3>Commandes</h3><p>128</p></div>
        <div class="card"><h3>Produits</h3><p>42</p></div>
        <div class="card"><h3>Revenus</h3><p>2 450 $</p></div>
    </section>
</main>

<script>
    // 1. Vérification de la connexion
    if (localStorage.getItem("vendeurConnecte") !== "true") {
        window.location.href = "connexion-vendeur.html";
    }

    // 2. Récupération sécurisée du profil
    const vendeur = JSON.parse(localStorage.getItem("vendeur") || "{}");

    // 3. Affichage du nom
   const profilNom = document.querySelector(".profile strong");

if (vendeur.nom && profilNom) {
    profilNom.textContent = vendeur.nom;
}

    // 4. Fonction de Déconnexion
   function logout() {

    if (confirm("Voulez-vous vraiment vous déconnecter ?")) {

        localStorage.removeItem("vendeurConnecte");
        localStorage.removeItem("vendeur");

        window.location.href = "index.html";

    }

}
</script>

</body>
</html>
