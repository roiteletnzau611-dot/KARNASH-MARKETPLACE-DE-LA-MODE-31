<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion Vendeur</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:400px;
background:#fff;
padding:30px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h2{
text-align:center;
margin-bottom:20px;
color:#2c3e50;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#28a745;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#218838;
}

p{
text-align:center;
margin-top:15px;
}

a{
color:#007bff;
text-decoration:none;
}
</style>

</head>
<body>

<div class="container">

<h2>🏪 Connexion Vendeur</h2>

<form id="loginSeller">

<input
type="email"
id="email"
placeholder="Adresse e-mail"
required>

<input
type="password"
id="password"
placeholder="Mot de passe"
required>

<button type="submit">
Se connecter
</button>

</form>

<p>
Pas encore de compte ?
<a href="inscription-vendeur.html">
Créer un compte vendeur
</a>
</p>

</div>

<script>
document.getElementById("loginSeller").addEventListener("submit",function(e){

e.preventDefault();

const vendeur=JSON.parse(localStorage.getItem("vendeur"));

if(email===vendeur.email && password===vendeur.password){

localStorage.setItem("vendeurConnecte","true");

alert("Bienvenue " + vendeur.nom + " !");

window.location.href="vendeur-dashboard.html";

}else{

alert("Adresse e-mail ou mot de passe incorrect.");

}

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

if(email===vendeur.email && password===vendeur.password){

alert("Bienvenue " + vendeur.nom + " !");

window.location.href="vendeur-dashboard.html";

}else{

alert("Adresse e-mail ou mot de passe incorrect.");

}

});
</script>
