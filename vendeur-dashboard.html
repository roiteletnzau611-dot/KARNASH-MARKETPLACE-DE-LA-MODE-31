<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau de bord Vendeur</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

header{
background:#1f4e79;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1100px;
margin:30px auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
margin-bottom:20px;
text-align:center;
}

img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:3px solid #1f4e79;
margin-bottom:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.box{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
cursor:pointer;
transition:.3s;
}

.box:hover{
transform:translateY(-5px);
}

button{
margin-top:20px;
padding:12px 20px;
background:#d9534f;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>

</head>
<body>

<header>
<h1>🏪 Tableau de bord Vendeur</h1>
</header>

<div class="container">

<div class="card">

<img id="photo" src="https://via.placeholder.com/120">

<h2 id="boutique">Ma Boutique</h2>

<p>Responsable : <span id="nom"></span></p>

<p>Email : <span id="email"></span></p>

<p>Téléphone : <span id="telephone"></span></p>

<button onclick="deconnexion()">Déconnexion</button>

</div>

<div class="grid">

<div class="box">📦 Mes Produits</div>

<div class="box">➕ Ajouter un Produit</div>

<div class="box">📋 Commandes</div>

<div class="box">💰 Revenus</div>

<div class="box">📈 Statistiques</div>

<div class="box">💬 Messages</div>

<div class="box">⭐ Avis Clients</div>

<div class="box">⚙️ Paramètres</div>

</div>

</div>

<script>

const vendeur=JSON.parse(localStorage.getItem("vendeur"));

if(!vendeur){
window.location.href="login-vendeur.html";
}

document.getElementById("boutique").textContent=vendeur.boutique;
document.getElementById("nom").textContent=vendeur.nom;
document.getElementById("email").textContent=vendeur.email;
document.getElementById("telephone").textContent=vendeur.telephone;

if(vendeur.photo){
document.getElementById("photo").src=vendeur.photo;
}

function deconnexion(){
localStorage.removeItem("vendeurConnecte");
window.location.href="login-vendeur.html";
}

// Vérifie que le vendeur est connecté
if (localStorage.getItem("vendeurConnecte") !== "true") {
    window.location.href = "login-vendeur.html";
}

// Fonction de navigation
function ouvrir(page) {
    window.location.href = page;
}

// Connexion des boutons du tableau de bord
document.getElementById("btnProduits").onclick = () => ouvrir("mes-produits.html");
document.getElementById("btnAjouter").onclick = () => ouvrir("ajouter-produit.html");
document.getElementById("btnCommandes").onclick = () => ouvrir("commandes.html");
document.getElementById("btnRevenus").onclick = () => ouvrir("revenus.html");
document.getElementById("btnStatistiques").onclick = () => ouvrir("statistiques.html");
document.getElementById("btnMessages").onclick = () => ouvrir("messages.html");
document.getElementById("btnAvis").onclick = () => ouvrir("avis.html");
document.getElementById("btnParametres").onclick = () => ouvrir("parametres.html");


</script>

</body>
</html>
