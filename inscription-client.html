<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription Client</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#fff;
padding:30px;
width:400px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h2{
text-align:center;
margin-bottom:20px;
color:#2c3e50;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#007bff;
color:#fff;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#0056b3;
}

a{
text-decoration:none;
color:#007bff;
}

p{
margin-top:15px;
text-align:center;
}
</style>

</head>
<body>

<div class="container">

<h2>👤 Inscription Client</h2>

<form id="registerForm">

<input
type="text"
id="nom"
placeholder="Nom complet"
required>

<input
type="email"
id="email"
placeholder="Adresse e-mail"
required>

<input
type="tel"
id="telephone"
placeholder="Téléphone"
required>

<input
type="password"
id="password"
placeholder="Mot de passe"
required>

<input
type="password"
id="confirm"
placeholder="Confirmer le mot de passe"
required>

<button type="submit">
Créer mon compte
</button>

</form>

<p>
Déjà inscrit ?
<a href="connexion-client.html">
Se connecter
</a>
</p>

</div>

<script>
document.getElementById("registerForm")
.addEventListener("submit",function(e){

e.preventDefault();

const nom=document.getElementById("nom").value;
const email=document.getElementById("email").value;
const telephone=document.getElementById("telephone").value;
const password=document.getElementById("password").value;
const confirm=document.getElementById("confirm").value;

if(password!==confirm){
alert("Les mots de passe ne correspondent pas.");
return;
}

const utilisateur={
nom,
email,
telephone,
password
};

localStorage.setItem("client",JSON.stringify(utilisateur));

alert("Compte créé avec succès !");

window.location.href="connexion-client.html";

});
</script>

</body>
</html>
