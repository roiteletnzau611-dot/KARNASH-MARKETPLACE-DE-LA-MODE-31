<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favoris | Vogue Marketplace</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:linear-gradient(135deg,#6a2b83,#3d1a4d);
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
max-width:1200px;
margin:30px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
padding:20px;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.15);
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.content{
padding:15px;
}

.price{
font-size:22px;
color:#6a2b83;
font-weight:bold;
margin:10px 0;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:30px;
cursor:pointer;
font-size:16px;
}

.panier{
background:#6a2b83;
color:white;
}

.supprimer{
background:#e74c3c;
color:white;
}

footer{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:15px;
box-shadow:0 -2px 10px rgba(0,0,0,.15);
}

footer a{
text-decoration:none;
color:#6a2b83;
font-weight:bold;
}

</style>

</head>

<body>

<header>

❤️ Mes Favoris

</header>

<div class="container">

<div class="card">

<img src="https://via.placeholder.com/300x220">

<div class="content">

<h3>Chemise Homme</h3>

<p>Boutique Élégance</p>

<div class="price">25 $</div>

<button class="panier">
🛒 Ajouter au panier
</button>

<button class="supprimer">
❌ Retirer des favoris
</button>

</div>

</div>

<div class="card">

<img src="https://via.placeholder.com/300x220">

<div class="content">

<h3>Basket Sport</h3>

<p>Luxury Wear</p>

<div class="price">80 $</div>

<button class="panier">
🛒 Ajouter au panier
</button>

<button class="supprimer">
❌ Retirer des favoris
</button>

</div>

</div>

</div>

<footer>

<a href="client-dashboard.html">🏠 Accueil</a>

<a href="discussion.html">💬 Discussion</a>

<a href="panier.html">🛒 Panier</a>

<a href="profil.html">👤 Profil</a>

</footer>

</body>
</html>
